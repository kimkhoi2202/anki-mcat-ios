# Fly.io config for the self-hosted, version-matched Anki sync server.
# Credentials are set out-of-band as a secret (never commit them):
#   fly secrets set SYNC_USER1="anki:<password>" -a anki-mcat-sync
app = "anki-mcat-sync"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "anki_data"
  destination = "/anki_data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
