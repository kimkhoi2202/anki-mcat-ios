name: AnkiSpeedrun
options:
  bundleIdPrefix: com.khoilam
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  AnkiKit:
    path: ../AnkiKit
targets:
  AnkiSpeedrun:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AnkiKit
        product: AnkiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khoilam.ankispeedrun
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        # Device builds: automatic signing. Set DEVELOPMENT_TEAM to your Apple
        # Developer Team ID (or pass DEVELOPMENT_TEAM=XXXX to xcodebuild) to build
        # for / install on a physical device. Simulator builds need no team.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Anki Speedrun"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
