name: AnkiSpeedrun
options:
  bundleIdPrefix: com.khoilam
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  AnkiKit:
    path: ../AnkiKit
targets:
  AnkiSpeedrun:
    type: application
    platform: iOS
    sources:
      - Sources
      # Anki's prebuilt SvelteKit web pages (graphs / card-info / deck-options),
      # bundled as a folder reference so the directory structure is preserved.
      - path: Resources/sveltekit
        type: folder
    dependencies:
      - package: AnkiKit
        product: AnkiKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khoilam.ankispeedrun
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        # Device builds: automatic signing. Set DEVELOPMENT_TEAM to your Apple
        # Developer Team ID (or pass DEVELOPMENT_TEAM=XXXX to xcodebuild) to build
        # for / install on a physical device. Simulator builds need no team.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Anki Speedrun"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        # Usage strings for the note editor's media attach actions: camera capture
        # (image), microphone (audio recording), and the photo library. Required
        # for the OS permission prompts; without them the app would crash on use.
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a photo to add to a note's fields."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio to add to a note's fields."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Add images from your photo library to a note's fields."
        # We ship an asset catalog (the login logo) but no app icon yet; tell the
        # asset compiler not to require an "AppIcon" set.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
